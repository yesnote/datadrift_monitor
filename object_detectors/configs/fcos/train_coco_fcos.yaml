mode: train

model:
  type: fcos
  backbone: resnet50_fpn
  weights: ""
  pretrained: false
  config_file: ""
  confidence_threshold: 0.05
  iou_threshold: 0.6
  max_det: 100
  device: cuda

dataset:
  used_dataset: coco
  used_ratio: 1.0
  coco:
    root: D:/SEONGJIN/datasets/COCO
    train_split: train2017
    val_split: val2017
    image_dir: images
    annotation_dir: annotations
    train_annotation_file: instances_train2017.json
    val_annotation_file: instances_val2017.json

dataloader:
  batch_size: 2
  num_workers: 4
  pin_memory: true
  shuffle_train: true
  shuffle_eval: false
  aspect_ratio_grouping: true

training:
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  seed: 42

