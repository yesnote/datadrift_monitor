mode: predict

model:
  type: fcos
  backbone: resnet50_fpn
  weights: ""
  pretrained: false
  config_file: ""
  confidence_threshold: 0.05
  iou_threshold: 0.6
  max_det: 100
  device: cuda

dataset:
  used_dataset:
    - cityscapes
  split:
    - val
  used_ratio:
    - 1.0
  cityscapes:
    root: D:/SEONGJIN/datasets/Cityscapes
    train_split: train
    val_split: val
    train_image_dir: leftImg8bit/train
    val_image_dir: leftImg8bit/val
    train_annotation_dir: gtFine/train
    val_annotation_dir: gtFine/val

dataloader:
  batch_size: 2
  num_workers: 4
  pin_memory: true
  shuffle_train: false
  shuffle_eval: false
  aspect_ratio_grouping: true

output:
  # gt | deterministic | score | class_probability | entropy | energy | mc_dropout | ensemble
  uncertainty: gt
  gt:
    iou_match_threshold: 0.5
    save_csv:
      enabled: true
    save_image:
      enabled: false
      step: 100
      max_num: 10
  score:
    save_csv:
      enabled: true
  class_probability:
    save_csv:
      enabled: true
  entropy:
    save_csv:
      enabled: true
  energy:
    save_csv:
      enabled: true
  mc_dropout:
    num_runs: 30
    dropout_rate: 0.5
    save_csv:
      enabled: true
  ensemble:
    weights: []
    save_csv:
      enabled: true
