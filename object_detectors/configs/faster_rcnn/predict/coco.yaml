mode: predict

model:
  type: faster_rcnn
  backbone: resnet50_fpn
  weights: object_detectors/models/faster_rcnn/weights/coco/fasterrcnn_resnet50_fpn_coco.pth
  pretrained: true
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: cuda

dataset:
  used_dataset:
    - coco
  split:
    - train
  used_ratio:
    - 1.0

  coco:
    root: D:/SEONGJIN/datasets/COCO
    train_split: train2017
    val_split: val2017
    image_dir: images
    annotation_dir: annotations
    train_annotation_file: instances_train2017.json
    val_annotation_file: instances_val2017.json

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: false
  shuffle_train: false
  shuffle_eval: false
  aspect_ratio_grouping: true

output:
  # gt | deterministic | score | class_probability | entropy | energy | mc_dropout | ensemble | meta_detect | null_detect | layer_grad
  uncertainty: gt
  gt:
    iou_match_threshold: 0.45
    save_csv:
      enabled: true
    save_image:
      enabled: true
      step: 100
      max_num: 10
  
  score:
    save_csv:
      enabled: true
  
  class_probability:
    save_csv:
      enabled: true
 
  entropy:
    save_csv:
      enabled: true
  
  energy:
    save_csv:
      enabled: true
  
  mc_dropout:
    num_runs: 30
    dropout_rate: 0.5
    save_csv:
      enabled: true
  
  ensemble:
    weights:
      - object_detectors/models/faster_rcnn/weights/coco/fasterrcnn_resnet50_fpn_coco.pth
      - object_detectors/runs/faster_rcnn/train/coco/06-24-2026_22;06_faster_rcnn_seed42/weights/last.pt
      - object_detectors/runs/faster_rcnn/train/coco/06-24-2026_22;06_faster_rcnn_seed43/weights/last.pt
      - object_detectors/runs/faster_rcnn/train/coco/06-24-2026_22;06_faster_rcnn_seed44/weights/last.pt
      - object_detectors/runs/faster_rcnn/train/coco/06-24-2026_22;06_faster_rcnn_seed45/weights/last.pt
    save_csv:
      enabled: true
  
  meta_detect:
    score_threshold: 0.0
    iou_threshold: 0.45
    save_csv:
      enabled: true

  null_detect:
    rpn:
      bbox_loss: offset_l2  # offset_l1 | offset_l2
      obj_loss: abs_diff  # bcewithlogits | abs_diff | signed_diff
      bbox_direction: pred_to_target  # fixed; reverse is redundant for offset_l1/offset_l2
      obj_direction: pred_to_target  # pred_to_target | target_to_pred, only for obj_loss: signed_diff
    roi:
      bbox_loss: box_l1  # box_l1 | box_l2 | offset_l1 | offset_l2
      cls_loss: bcewithlogits  # bcewithlogits | kl
      bbox_direction: pred_to_target  # fixed; reverse is redundant for box_l1/box_l2/offset_l1/offset_l2
      cls_direction: pred_to_target  # pred_to_target | target_to_pred, only for cls_loss: kl
    feature_set: full  # full | losses_only
    save_csv:
      enabled: true
  
  layer_grad:
    gradient:
      target: cand_target  # cand_target | null_target
      reduction: [l1_norm, l2_norm, min, max, mean, std]

      cand_target:
        # rpn_bbox_loss offset_*: sum over candidates of bbox_loss(candidate RPN bbox delta, delta(candidate RPN anchor -> final detection box))
        # rpn_obj_loss: sum over candidates of obj_loss(candidate RPN objectness logit, positive anchor target 1)
        # roi_bbox_loss box_*: sum over candidates of bbox_loss(decoded candidate ROI box, final detection box after ROI NMS)
        # roi_bbox_loss offset_*: sum over candidates of bbox_loss(candidate ROI bbox delta, final detection ROI bbox delta)
        # roi_cls_loss: sum over candidates of cls_loss(candidate ROI class logits, final detection class target)
        scalar: [rpn_obj_loss, rpn_bbox_loss, roi_cls_loss, roi_bbox_loss]
        layer:
          rpn_obj_loss: ["rpn.head.conv", "rpn.head.cls_logits"]
          rpn_bbox_loss: ["rpn.head.conv", "rpn.head.bbox_pred"]
          roi_cls_loss: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.cls_score"]
          roi_bbox_loss: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.bbox_pred"]
        rpn:
          cand_obj_threshold: 0.0
          obj_loss: bcewithlogits  # bcewithlogits | abs_diff | signed_diff
          bbox_loss: offset_l1  # offset_l1 | offset_l2
          obj_direction: pred_to_target  # pred_to_target | target_to_pred, only for obj_loss: signed_diff
          bbox_direction: pred_to_target  # fixed; reverse is redundant for offset_l1/offset_l2
        roi:
          cand_score_threshold: 0.0
          cls_loss: bcewithlogits  # bcewithlogits | kl
          bbox_loss: box_l1  # box_l1 | box_l2 | offset_l1 | offset_l2
          cls_direction: pred_to_target  # pred_to_target | target_to_pred, only for cls_loss: kl
          bbox_direction: pred_to_target  # fixed; reverse is redundant for box_l1/box_l2/offset_l1/offset_l2

      null_target:
        # rpn_bbox_loss offset_*: bbox_loss(source RPN bbox delta, delta(source RPN anchor -> final detection box))
        # rpn_obj_loss: obj_loss(source RPN objectness logit, target 0.5)
        # roi_bbox_loss box_*: bbox_loss(final ROI decoded box, source proposal)
        # roi_bbox_loss offset_*: bbox_loss(final ROI bbox delta, zero delta)
        # roi_cls_loss: cls_loss(final detection class logits, null class target: 0.5 vector for BCE, 1/C uniform for KL)
        scalar: [rpn_obj_loss, rpn_bbox_loss, roi_cls_loss, roi_bbox_loss]
        layer:
          rpn_obj_loss: ["rpn.head.conv", "rpn.head.cls_logits"]
          rpn_bbox_loss: ["rpn.head.conv", "rpn.head.bbox_pred"]
          roi_cls_loss: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.cls_score"]
          roi_bbox_loss: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.bbox_pred"]
        rpn:
          obj_loss: bcewithlogits  # bcewithlogits | abs_diff | signed_diff
          bbox_loss: offset_l1  # offset_l1 | offset_l2
          obj_direction: pred_to_target  # pred_to_target | target_to_pred, only for obj_loss: signed_diff
          bbox_direction: pred_to_target  # fixed; reverse is redundant for offset_l1/offset_l2
        roi:
          cls_loss: bcewithlogits  # bcewithlogits | kl
          bbox_loss: box_l1  # box_l1 | box_l2 | offset_l1 | offset_l2
          cls_direction: pred_to_target  # pred_to_target | target_to_pred, only for cls_loss: kl
          bbox_direction: pred_to_target  # fixed; reverse is redundant for box_l1/box_l2/offset_l1/offset_l2
    save_csv:
      enabled: true


