mode: train

model:
  type: faster_rcnn
  backbone: resnet50_fpn
  weights: object_detectors/models/faster_rcnn/weights/coco/fasterrcnn_resnet50_fpn_coco.pth
  pretrained: true
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: cuda

dataset:
  used_dataset: bdd100k
  used_ratio: 1.0
  bdd100k:
    root: D:/SEONGJIN/datasets/BDD100K
    train_split: train
    val_split: val
    train_image_dir: bdd100k/bdd100k/images/100k/train
    val_image_dir: bdd100k/bdd100k/images/100k/val
    train_annotation_file: bdd100k_labels_release/bdd100k/labels/bdd100k_labels_images_train.json
    val_annotation_file: bdd100k_labels_release/bdd100k/labels/bdd100k_labels_images_val.json

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: true
  shuffle_train: true
  shuffle_eval: false
  aspect_ratio_grouping: true

training:
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  seed: 42

