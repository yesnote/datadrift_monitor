mode: predict

model:
  type: faster_rcnn
  backbone: resnet50_fpn
  weights: object_detectors/models/faster_rcnn/weights/coco/fasterrcnn_resnet50_fpn_coco.pth
  pretrained: true
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: cuda

dataset:
  used_dataset:
    - coco
  split:
    - train
  used_ratio:
    - 0.05

  coco:
    root: D:/SEONGJIN/datasets/COCO
    train_split: train2017
    val_split: val2017
    image_dir: images
    annotation_dir: annotations
    train_annotation_file: instances_train2017.json
    val_annotation_file: instances_val2017.json

dataloader:
  batch_size: 8
  num_workers: 4
  pin_memory: false
  shuffle_train: false
  shuffle_eval: false
  aspect_ratio_grouping: true

output:
  # gt | deterministic | score | class_probability | entropy | energy | mc_dropout | ensemble | meta_detect
  uncertainty: gt  # gt | deterministic | score | class_probability | entropy | energy | mc_dropout | ensemble | meta_detect | layer_grad
  gt:
    iou_match_threshold: 0.45
    save_csv:
      enabled: true
    save_image:
      enabled: true
      step: 100
      max_num: 10
  
  score:
    save_csv:
      enabled: true
  
  class_probability:
    save_csv:
      enabled: true
 
  entropy:
    save_csv:
      enabled: true
  
  energy:
    save_csv:
      enabled: true
  
  mc_dropout:
    num_runs: 30
    dropout_rate: 0.5
    save_csv:
      enabled: true
  
  ensemble:
    weights: []
    save_csv:
      enabled: true
  
  meta_detect:
    score_threshold: 0.0
    iou_threshold: 0.45
    save_csv:
      enabled: true
  
  layer_grad:
    gradient:
      scalar: [bbox_loss, cls_loss]
      layer: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.cls_score", "roi_heads.box_predictor.bbox_pred"]
      target: cand_target
      reduction: [l1_norm, l2_norm, min, max, mean, std]
      cand_score_threshold: 0.0
      bbox_loss: l1  # l1 | l2
      cls_loss: bcewithlogits  # bcewithlogits | kl | ce
      bbox_direction: pred_to_target
      cls_direction: pred_to_target
    save_csv:
      enabled: true
