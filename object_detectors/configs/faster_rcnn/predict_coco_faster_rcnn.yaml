mode: predict

model:
  type: faster_rcnn
  backbone: resnet50_fpn
  weights: object_detectors/models/faster_rcnn/weights/coco/fasterrcnn_resnet50_fpn_coco.pth
  pretrained: true
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: cuda

dataset:
  used_dataset:
    - coco
  split:
    - train
  used_ratio:
    - 0.05

  coco:
    root: D:/SEONGJIN/datasets/COCO
    train_split: train2017
    val_split: val2017
    image_dir: images
    annotation_dir: annotations
    train_annotation_file: instances_train2017.json
    val_annotation_file: instances_val2017.json

dataloader:
  batch_size: 8
  num_workers: 4
  pin_memory: false
  shuffle_train: false
  shuffle_eval: false
  aspect_ratio_grouping: true

output:
  # gt | deterministic | score | class_probability | entropy | energy | mc_dropout | ensemble | meta_detect | layer_grad
  uncertainty: gt
  gt:
    iou_match_threshold: 0.45
    save_csv:
      enabled: true
    save_image:
      enabled: true
      step: 100
      max_num: 10
  
  score:
    save_csv:
      enabled: true
  
  class_probability:
    save_csv:
      enabled: true
 
  entropy:
    save_csv:
      enabled: true
  
  energy:
    save_csv:
      enabled: true
  
  mc_dropout:
    num_runs: 30
    dropout_rate: 0.5
    save_csv:
      enabled: true
  
  ensemble:
    weights: []
    save_csv:
      enabled: true
  
  meta_detect:
    score_threshold: 0.0
    iou_threshold: 0.45
    save_csv:
      enabled: true
  
  layer_grad:
    gradient:
      target: cand_target  # cand_target | null_target | null_target_2
      reduction: [l1_norm, l2_norm, min, max, mean, std]

      cand_target:
        # rpn_bbox_loss: decoded candidate RPN proposals vs final detection box
        # rpn_obj_loss: candidate RPN objectness logits vs target 1.0
        # roi_bbox_loss: decoded candidate ROI boxes vs final detection box
        # roi_cls_loss: candidate ROI class logits vs final detection class target
        scalar: [rpn_obj_loss, rpn_bbox_loss, roi_cls_loss, roi_bbox_loss]
        layer:
          rpn_obj_loss: ["rpn.head.conv", "rpn.head.cls_logits"]
          rpn_bbox_loss: ["rpn.head.conv", "rpn.head.bbox_pred"]
          roi_cls_loss: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.cls_score"]
          roi_bbox_loss: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.bbox_pred"]
        rpn:
          cand_obj_threshold: 0.0
          obj_loss: bcewithlogits  # bcewithlogits | abs_diff | signed_diff
          bbox_loss: l1  # l1 | l2 | smooth_l1
          obj_direction: pred_to_target  # pred_to_target | target_to_pred, only for obj_loss: signed_diff
          bbox_direction: pred_to_target  # fixed; reverse is redundant for l1/l2/smooth_l1
        roi:
          cand_score_threshold: 0.0
          cls_loss: bcewithlogits  # bcewithlogits | kl | ce
          bbox_loss: l1  # l1 | l2 | smooth_l1
          cls_direction: pred_to_target  # pred_to_target | target_to_pred, only for cls_loss: kl
          bbox_direction: pred_to_target  # fixed; reverse is redundant for l1/l2/smooth_l1

      null_target:
        # bbox_loss: final ROI decoded box vs source RPN anchor
        # obj_loss: source RPN objectness logit vs target 0.5
        # cls_loss: final ROI class logits vs uniform class target
        scalar: [bbox_loss, obj_loss, cls_loss]
        layer:
          bbox_loss: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.bbox_pred"]
          obj_loss: ["rpn.head.conv", "rpn.head.cls_logits"]
          cls_loss: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.cls_score"]
        bbox_loss: l1  # l1 | l2 | smooth_l1
        obj_loss: bcewithlogits  # bcewithlogits | abs_diff | signed_diff
        cls_loss: bcewithlogits  # bcewithlogits | kl | ce
        bbox_direction: pred_to_target  # fixed; reverse is redundant for l1/l2/smooth_l1
        obj_direction: pred_to_target  # pred_to_target | target_to_pred, only for obj_loss: signed_diff
        cls_direction: pred_to_target  # pred_to_target | target_to_pred, only for cls_loss: kl
      
      null_target_2:
        # rpn_bbox_loss: RPN predicted delta(anchor -> proposal) vs target delta(anchor -> final box)
        # rpn_obj_loss: source RPN objectness logit vs target 0.5
        # roi_bbox_loss: ROI predicted delta(proposal -> box) vs target delta(proposal -> final box)
        # roi_cls_loss: final ROI class logits vs uniform class target
        scalar: [rpn_obj_loss, rpn_bbox_loss, roi_cls_loss, roi_bbox_loss]
        layer:
          rpn_obj_loss: ["rpn.head.conv", "rpn.head.cls_logits"]
          rpn_bbox_loss: ["rpn.head.conv", "rpn.head.bbox_pred"]
          roi_cls_loss: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.cls_score"]
          roi_bbox_loss: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.bbox_pred"]
        rpn:
          obj_loss: bcewithlogits  # bcewithlogits | abs_diff | signed_diff
          bbox_loss: smooth_l1  # l1 | l2 | smooth_l1
          obj_direction: pred_to_target  # pred_to_target | target_to_pred, only for obj_loss: signed_diff
          bbox_direction: pred_to_target  # fixed; reverse is redundant for l1/l2/smooth_l1
        roi:
          cls_loss: bcewithlogits  # bcewithlogits | kl | ce
          bbox_loss: smooth_l1  # l1 | l2 | smooth_l1
          cls_direction: pred_to_target  # pred_to_target | target_to_pred, only for cls_loss: kl
          bbox_direction: pred_to_target  # fixed; reverse is redundant for l1/l2/smooth_l1
    save_csv:
      enabled: true
