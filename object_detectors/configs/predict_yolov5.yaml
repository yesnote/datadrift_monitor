mode: predict

model:
  type: yolov5
  weights: object_detectors/models/yolo/weights/yolov5x.pt
  img_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: cuda

dataset:
  used_dataset:   # coco | voc | openimages
    - coco
    - openimages
  split:  # train | val | test
    - val
    - val
  
  coco:
    root: D:/SEONGJIN/datasets/COCO
    train_split: train2017
    val_split: val2017
    test_split: test2017
    image_dir: images
    annotation_dir: annotations
    train_annotation_file: instances_train2017.json
    val_annotation_file: instances_val2017.json
    test_annotation_file: instances_test2017.json
  
  openimages:
    root: D:/SEONGJIN/datasets/OIDv4_ToolKit/OID/Dataset
    train_split: train
    val_split: validation
    test_split: test
    min_gt_boxes: 1  # keep only images with at least this many GT boxes

dataloader:
  batch_size: 32
  num_workers: 4
  pin_memory: false
  shuffle_train: false
  shuffle_eval: false

output:
  unit: image   # image | bbox
  uncertainty: layer_grad  # gt | score | full_softmax | entropy | energy | mc_dropout | meta_detect | feature | feature_grad | layer_grad
  pre_nms:
    enabled: false   # true: use pre-NMS preds | false: use post-NMS preds
    pre_nms_ratio: 1.0  # keep top ratio (0~1) of pre-NMS candidates

  save_csv:
    enabled: false
    gt: # unit:image -> fn | unit:bbox -> tp
      iou_match_threshold: 0.45

    score:
      vector_reduction: [L1, L2, min, max, mean, std]  # only for unit: image

    full_softmax:
      vector_reduction: [L1, L2, min, max, mean, std]  # only for unit: image
    
    entropy:
      vector_reduction: [L1, L2, min, max, mean, std]  # only for unit: image

    energy:
      vector_reduction: [L1, L2, min, max, mean, std]  # only for unit: image

    mc_dropout:
      num_runs: 30
      dropout_rate: 0.5
      queue_maxsize: 2
      vector_reduction: [L1, L2, min, max, mean, std]  # only for unit: image

    # TODO: ensemble
    
    meta_detect:
      score_threshold: 0.0
      iou_threshold: 0.45
      vector_reduction: [L1, L2, min, max, mean, std]  # only for unit: image

    feature:
      target_layer: ["model.24.m.0", "model.24.m.1", "model.24.m.2"]
      map_reduction: none  # none | energy
      vector_reduction: [L1, L2, min, max, mean, std]  # empty list [] means save raw vector

    feature_grad:
      target_value: [obj, cls]  # loss | obj_loss | cls_loss | bbox_loss | obj | cls
      target_layer: ["model.24.m.0", "model.24.m.1", "model.24.m.2"]
      map_reduction: none   # none | energy
      vector_reduction: [L1, L2, min, max, mean, std]  # empty list [] means save raw vector

    layer_grad:
      target_value:
        value: [loss]  # loss | obj_loss | cls_loss | bbox_loss | obj | cls
        pseudo_gt: uniform  # cand | uniform
      target_layer: ["model.24.m.0", "model.24.m.1", "model.24.m.2"]  # "model.17.cv3.conv", "model.20.cv3.conv", "model.23.cv3.conv"
      map_reduction: none   # none | energy
      vector_reduction: [L1, L2, min, max, mean, std]  # empty list [] means save raw vector
  
  save_image:
    enabled: true
    gt:
      step: 10
      max_num: 10
    
    layer_grad:
      target_layer: all_conv   # all_conv | target_layer | [layer names]
      normalize: layer_minmax  # layer_minmax | layer_trimmed_minmax | none
      max_num_per_group: 20
      save_mean_maps: true
      save_diff_map: true
      save_graph: true
      save_per_image: false
