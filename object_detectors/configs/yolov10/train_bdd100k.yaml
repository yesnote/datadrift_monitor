mode: train

model:
  type: yolov10
  weights: 
  img_size: 640
  variant: n
  max_det: 300
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: cuda

dataset:
  used_dataset: bdd100k
  used_ratio: 1.0

  bdd100k:
    root: D:/SEONGJIN/datasets/BDD100K
    train_split: train
    val_split: val
    train_image_dir: bdd100k/bdd100k/images/100k/train
    val_image_dir: bdd100k/bdd100k/images/100k/val
    train_annotation_file: bdd100k_labels_release/bdd100k/labels/bdd100k_labels_images_train.json
    val_annotation_file: bdd100k_labels_release/bdd100k/labels/bdd100k_labels_images_val.json

dataloader:
  batch_size: 12
  num_workers: 4
  pin_memory: true
  shuffle_train: true
  shuffle_eval: false
  persistent_workers: true
  prefetch_factor: 2

loss:
  box: 0.05
  cls: 0.5
  dfl: 1.5

training:
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  seed: 42
  amp: true
  val_interval: 1
  save_last_interval: 1
  save_best: true
  save_optimizer: true
  freeze_feature_extractor: false
  log_timing: false





