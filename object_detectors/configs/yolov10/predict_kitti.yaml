mode: predict

model:
  type: yolov10
  weights: object_detectors/models/yolov10/weights/kitti/yolov10n.pt
  img_size: 640
  variant: n
  max_det: 300
  confidence_threshold: 0.25
  device: cuda

dataset:
  used_dataset:
    - kitti
  split:
    - val
  used_ratio:
    - 1.0

  kitti:
    root: D:/SEONGJIN/datasets/KITTI
    train_split: train
    val_split: val
    test_split: test
    train_image_dir: training/image_2
    val_image_dir: training/image_2
    test_image_dir: testing/image_2
    train_label_dir: training/label_2
    val_label_dir: training/label_2
    train_split_file: ImageSets/train.txt
    val_split_file: ImageSets/val.txt
    trainval_split_ratio: 0.8

dataloader:
  batch_size: 8
  num_workers: 4
  pin_memory: false
  shuffle_train: false
  shuffle_eval: false

output:
  uncertainty: gt  # gt | deterministic | score | class_probability | entropy | energy | mc_dropout | ensemble | null_detect | layer_grad

  gt:
    iou_match_threshold: 0.45
    save_csv:
      enabled: true
    save_image:
      enabled: false
      step: 10
      max_num: 10

  score:
    save_csv:
      enabled: false

  class_probability:
    save_csv:
      enabled: false

  entropy:
    save_csv:
      enabled: false

  energy:
    save_csv:
      enabled: false

  mc_dropout:
    num_runs: 30
    dropout_rate: 0.5
    save_csv:
      enabled: false

  ensemble:
    weights: []
    save_csv:
      enabled: false

  null_detect:
    cls_loss: kl  # bcewithlogits | kl
    cls_direction: pred_to_target  # pred_to_target | target_to_pred, only for cls_loss: kl
    feature_set: full  # full | losses_only
    save_csv:
      enabled: true

  layer_grad:
    gradient:
      # null_target only:
      #   bbox_loss l1/l2: loss(final detection box source-point offset, zero offset)
      #   cls_loss: loss(source class logits, uniform/null class target)
      scalar: [bbox_loss, cls_loss]
      layer: ["model.23.one2one_cv2.0.2", "model.23.one2one_cv3.0.2"]
      reduction: [l1_norm, l2_norm, min, max, mean, std]
      target: null_target
      bbox_loss: l1  # l1 | l2
      cls_loss: bcewithlogits  # bcewithlogits | kl
      bbox_direction: pred_to_target
      cls_direction: pred_to_target
    save_csv:
      enabled: true
