mode: train

model:
  type: gb_classifier         # logistic | gb_classifier
  device: cpu                 # cpu | cuda
  search: false
  search_scoring: roc_auc

dataset:
  # object_detectors/runs/{fn_detectors|tp_classifiers}/{time}_{cue}
  # string or list of roots (features from all roots are merged)
  input_root:
    - object_detectors/runs/fn_detectors/03-12-2026_18;34_feature_grad
    # - object_detectors/runs/fn_detectors/03-12-2026_18;34_entropy
  gt_root: object_detectors/runs/fn_detectors/03-12-2026_18;34_fn

train:
  augmentation: none           # none | smote
  test_size: 0.3
  repeats: 15
  n_jobs: 8
  random_seed: 42
