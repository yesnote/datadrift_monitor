mode: train

input:
  # If empty, use the latest object_detectors/runs/*/fn_results.csv
  csv_path: ""
  results_root: object_detectors/runs

training:
  model: gb_classifier         # logistic | gb_classifier
  device: cpu                  # cpu | cuda
  augmentation: none           # none | smote
  test_size: 0.3
  repeats: 15
  search: false
  search_scoring: roc_auc
  n_jobs: 8
  random_seed: 42

output:
  # out_dir has priority over out_root when non-empty.
  out_dir: ""
  out_root: fn_detectors/runs
