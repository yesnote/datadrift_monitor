task: meta_regressor
mode: train

model:
  type: gb_regressor          # ridge | rf_regressor | gb_regressor | xgb_regressor
  device: cpu                 # cpu | cuda
  random_seed: 42
  search: false
  search_scoring: r2

dataset:
  input_root:
    - object_detectors/runs/yolov5/predict/coco/00-00-0000_00;00_layer_grad_cand_target_loss
  gt_root: object_detectors/runs/yolov5/predict/coco/00-00-0000_00;00_gt

experiment:
  process: repeat             # kfold | repeat
  n_jobs: 8

  kfold:
    num_fold: 10

  repeat:
    split: 0.3
    repeats: 15
