mode: predict

model:
  type: faster_rcnn
  backbone: resnet50_fpn
  weights: object_detectors/models/faster_rcnn/weights/coco/fasterrcnn_resnet50_fpn_coco.pth
  pretrained: true
  img_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.45
  max_det: 300
  device: cuda

dataset:
  used_dataset:
    - coco
  split:
    - train
  used_ratio:
    - 0.05

  coco:
    root: D:/SEONGJIN/datasets/COCO
    train_split: train2017
    val_split: val2017
    image_dir: images
    annotation_dir: annotations
    train_annotation_file: instances_train2017.json
    val_annotation_file: instances_val2017.json

dataloader:
  batch_size: 8
  num_workers: 4
  pin_memory: false
  shuffle_train: false
  shuffle_eval: false

output:
  # gt | deterministic | score | class_probability | entropy | energy | mc_dropout | ensemble | meta_detect
  uncertainty: gt
  gt:
    iou_match_threshold: 0.45
    save_csv:
      enabled: true
    save_image:
      enabled: false
      step: 10
      max_num: 10
  
  score:
    save_csv:
      enabled: false
  
  class_probability:
    save_csv:
      enabled: false
 
  entropy:
    save_csv:
      enabled: false
  
  energy:
    save_csv:
      enabled: false
  
  mc_dropout:
    num_runs: 30
    dropout_rate: 0.5
    save_csv:
      enabled: false
  
  ensemble:
    weights: []
    save_csv:
      enabled: false
  
  meta_detect:
    score_threshold: 0.0
    iou_threshold: 0.45
    save_csv:
      enabled: false

