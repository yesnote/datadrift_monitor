mode: predict

model:
  type: faster_rcnn
  backbone: resnet50_fpn
  weights: object_detectors/models/faster_rcnn/weights/coco/fasterrcnn_resnet50_fpn_coco.pth
  pretrained: true
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: cuda

dataset:
  used_dataset:
    - kitti
  split:
    - val
  used_ratio:
    - 1.0
  kitti:
    root: D:/SEONGJIN/datasets/KITTI
    train_split: train
    val_split: val
    test_split: test
    train_image_dir: training/image_2
    val_image_dir: training/image_2
    test_image_dir: testing/image_2
    train_label_dir: training/label_2
    val_label_dir: training/label_2
    train_split_file: ImageSets/train.txt
    val_split_file: ImageSets/val.txt
    trainval_split_ratio: 0.8

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: false
  shuffle_train: false
  shuffle_eval: false
  aspect_ratio_grouping: true

output:
  uncertainty: gt  # gt | deterministic | score | class_probability | entropy | energy | mc_dropout | ensemble | meta_detect | layer_grad
  gt:
    iou_match_threshold: 0.45
    save_csv: {enabled: true}
    save_image: {enabled: false, step: 10, max_num: 10}
  score: {save_csv: {enabled: false}}
  class_probability: {save_csv: {enabled: false}}
  entropy: {save_csv: {enabled: false}}
  energy: {save_csv: {enabled: false}}
  mc_dropout:
    num_runs: 30
    dropout_rate: 0.5
    save_csv: {enabled: false}
  ensemble:
    weights: []
    save_csv: {enabled: false}
  meta_detect:
    score_threshold: 0.0
    iou_threshold: 0.45
    save_csv: {enabled: false}
  layer_grad:
    gradient:
      scalar: [rpn_bbox_loss, rpn_obj_loss, roi_bbox_loss, roi_cls_loss]
      layer:
        rpn_obj_loss: ["rpn.head.conv", "rpn.head.cls_logits"]
        rpn_bbox_loss: ["rpn.head.conv", "rpn.head.bbox_pred"]
        roi_cls_loss: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.cls_score"]
        roi_bbox_loss: ["roi_heads.box_head.fc7", "roi_heads.box_predictor.bbox_pred"]
      target: cand_target
      reduction: [l1_norm, l2_norm, min, max, mean, std]
    cand_target:
      rpn_cand:
        enabled: true
        cand_obj_threshold: 0.0
        obj_loss: bcewithlogits
        bbox_loss: l1  # l1 | l2
        obj_direction: pred_to_target
        bbox_direction: pred_to_target
      roi_cand:
        enabled: true
        cand_score_threshold: 0.0
        cls_loss: bcewithlogits  # bcewithlogits | kl | ce
        bbox_loss: l1  # l1 | l2
        cls_direction: pred_to_target
        bbox_direction: pred_to_target
    save_csv: {enabled: false}

