mode: train

model:
  type: yolov5
  weights: object_detectors/models/yolo/weights/yolov5x.pt
  img_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: cuda

dataset:
  used_dataset: coco
  
  coco:
    root: object_detectors/datasets/COCO
    train_split: train2017
    val_split: val2017
    test_split: test2017
    image_dir: images
    annotation_dir: annotations
    train_annotation_file: instances_train2017.json
    val_annotation_file: instances_val2017.json
    test_annotation_file: instances_test2017.json
  
  voc:
    root: object_detectors/datasets/VOCdevkit/VOC2012
    train_split: train
    val_split: val
    test_split: test
  
  openimages:
    root: object_detectors/datasets/openimages
    train_split: train
    val_split: validation
    test_split: validation
    min_gt_boxes: 1  # keep only images with at least this many GT boxes

dataloader:
  batch_size: 8
  num_workers: 4
  pin_memory: true
  shuffle_train: true
  shuffle_eval: false

loss:
  box: 0.05
  cls: 0.5
  obj: 1.0

training:
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  seed: 42
