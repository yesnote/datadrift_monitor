mode: predict

model:
  type: faster_rcnn
  backbone: resnet50_fpn
  weights: ""
  pretrained: true
  img_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.45
  max_det: 300
  device: cuda

dataset:
  used_dataset:
    - foggy_cityscapes
  split:
    - val
  used_ratio:
    - 1.0
  foggy_cityscapes:
    root: D:/SEONGJIN/datasets/Cityscapes
    train_split: train
    val_split: val
    train_image_dir: leftImg8bit_foggy/train
    val_image_dir: leftImg8bit_foggy/val
    train_annotation_dir: gtFine/train
    val_annotation_dir: gtFine/val

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: false
  shuffle_train: false
  shuffle_eval: false

output:
  uncertainty: gt  # gt | deterministic | score | class_probability | entropy | energy | mc_dropout | ensemble | meta_detect
  gt:
    iou_match_threshold: 0.45
    save_csv: {enabled: true}
    save_image: {enabled: false, step: 10, max_num: 10}
  score: {save_csv: {enabled: false}}
  class_probability: {save_csv: {enabled: false}}
  entropy: {save_csv: {enabled: false}}
  energy: {save_csv: {enabled: false}}
  mc_dropout:
    num_runs: 30
    dropout_rate: 0.5
    save_csv: {enabled: false}
  ensemble:
    weights: []
    save_csv: {enabled: false}
  meta_detect:
    score_threshold: 0.0
    iou_threshold: 0.45
    save_csv: {enabled: false}
