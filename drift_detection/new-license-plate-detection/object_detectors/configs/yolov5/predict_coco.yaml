mode: predict

model:
  type: yolov5
  weights: object_detectors/models/yolo/weights/coco/yolov5x.pt
  img_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: cuda

dataset:
  used_dataset:   # coco | voc | openimages
    - coco
    # - coco
  split:  # train | val
    - train
    # - val
  used_ratio:
    - 0.1
    # - 1.0

  coco:
    root: D:/SEONGJIN/datasets/COCO
    train_split: train2017
    val_split: val2017
    image_dir: images
    annotation_dir: annotations
    train_annotation_file: instances_train2017.json
    val_annotation_file: instances_val2017.json

  voc:
    root: D:/SEONGJIN/datasets/VOC/VOCdevkit/VOC2012
    train_split: train
    val_split: val

  openimages:
    root: D:/SEONGJIN/datasets/OIDv4_ToolKit/OID/Dataset
    train_split: train
    val_split: validation
    test_split: test
    min_gt_boxes: 1

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: false
  shuffle_train: false
  shuffle_eval: false

output:
  # gt | deterministic | score | class_probability | entropy | energy | mc_dropout | ensemble | meta_detect | null_detect | layer_grad
  uncertainty: layer_grad

  gt:
    iou_match_threshold: 0.45
    save_csv:
      enabled: true
    save_image:
      enabled: false
      step: 10
      max_num: 10

  score:
    save_csv:
      enabled: true

  class_probability:
    save_csv:
      enabled: true

  entropy:
    save_csv:
      enabled: true

  energy:
    save_csv:
      enabled: true

  mc_dropout:
    num_runs: 30
    dropout_rate: 0.5
    save_csv:
      enabled: true

  ensemble:
    weights:
      - object_detectors/models/yolo/weights/coco/yolov5x.pt
      - object_detectors/runs/yolov5/train/coco/06-08-2026_15;09_yolov5_seed42/weights/last.pt
      - object_detectors/runs/yolov5/train/coco/06-08-2026_15;09_yolov5_seed43/weights/last.pt
      - object_detectors/runs/yolov5/train/coco/06-08-2026_15;09_yolov5_seed44/weights/last.pt
      - object_detectors/runs/yolov5/train/coco/06-08-2026_15;09_yolov5_seed45/weights/last.pt
    save_csv:
      enabled: true

  meta_detect:
    score_threshold: 0.0
    iou_threshold: 0.45
    save_csv:
      enabled: true

  null_detect:
    bbox_loss: box_l1  # box_l1 | box_l2 | offset_l1 | offset_l2
    cls_loss: kl  # bcewithlogits | kl
    obj_loss: bcewithlogits  # bcewithlogits | abs_diff | signed_diff
    bbox_direction: pred_to_target  # fixed; reverse is redundant for box_l1/box_l2/offset_l1/offset_l2
    cls_direction: pred_to_target  # pred_to_target | target_to_pred, only for cls_loss: kl
    obj_direction: pred_to_target  # pred_to_target | target_to_pred, only for obj_loss: signed_diff
    feature_set: full  # full | losses_only
    save_csv:
      enabled: true

  layer_grad:
    gradient:
      # cand_target:
      #   bbox_loss box_l1/box_l2: sum over candidates of bbox_loss(decoded candidate box, final detection box)
      #   bbox_loss offset_l1/offset_l2: sum over candidates of bbox_loss(candidate raw bbox offset, final detection raw bbox offset)
      #   obj_loss: sum over candidates of obj_loss(candidate raw objectness logit, final detection objectness)
      #   cls_loss: sum over candidates of cls_loss(candidate raw class logits, final detection class target)
      # null_target:
      #   bbox_loss box_l1/box_l2: bbox_loss(decoded final detection box, source anchor box)
      #   bbox_loss offset_l1/offset_l2: bbox_loss(final detection raw bbox offset, zero offset)
      #   obj_loss: obj_loss(final raw objectness logit, target 0.5)
      #   cls_loss: cls_loss(final raw class logits, uniform class target)
      scalar: [loss]
      layer: ["model.24.m.0", "model.24.m.1", "model.24.m.2"]
      reduction: [l1_norm, l2_norm, min, max, mean, std]  # [] saves raw gradient vectors
      target: cand_target # cand_target | null_target
      cand_score_threshold: 0.0
      bbox_loss: box_l1  # box_l1 | box_l2 | offset_l1 | offset_l2
      cls_loss: bcewithlogits  # bcewithlogits | kl
      obj_loss: bcewithlogits  # bcewithlogits | abs_diff | signed_diff
      bbox_direction: pred_to_target  # fixed; reverse is redundant for box_l1/box_l2/offset_l1/offset_l2
      cls_direction: pred_to_target  # pred_to_target | target_to_pred, only for cls_loss: kl
      # kl pred_to_target: KL(target || pred)
      obj_direction: pred_to_target  # pred_to_target | target_to_pred, only for obj_loss: signed_diff
    save_csv:
      enabled: true
