mode: train

model:
  type: faster_rcnn
  backbone: resnet50_fpn
  weights: ""
  pretrained: true
  img_size: 640
  confidence_threshold: 0.25
  iou_threshold: 0.45
  max_det: 300
  device: cuda

dataset:
  used_dataset: coco
  used_ratio: 1.0
  coco:
    root: D:/SEONGJIN/datasets/COCO
    train_split: train2017
    val_split: val2017
    image_dir: images
    annotation_dir: annotations
    train_annotation_file: instances_train2017.json
    val_annotation_file: instances_val2017.json

dataloader:
  batch_size: 4
  num_workers: 4
  pin_memory: true
  shuffle_train: true
  shuffle_eval: false

training:
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  seed: 42
