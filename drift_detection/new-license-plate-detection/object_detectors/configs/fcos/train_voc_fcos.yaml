mode: train

model:
  type: fcos
  backbone: resnet50_fpn
  weights: ""
  pretrained: false
  config_file: ""
  confidence_threshold: 0.05
  iou_threshold: 0.6
  max_det: 100
  device: cuda

dataset:
  used_dataset: voc
  used_ratio: 1.0
  voc:
    root: D:/SEONGJIN/datasets/VOC/VOCdevkit/VOC2012
    train_split: train
    val_split: val

dataloader:
  batch_size: 2
  num_workers: 4
  pin_memory: true
  shuffle_train: true
  shuffle_eval: false
  aspect_ratio_grouping: true

training:
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  seed: 42

