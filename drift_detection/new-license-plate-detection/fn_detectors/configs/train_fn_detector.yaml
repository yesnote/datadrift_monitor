mode: train

model:
  type: gb_classifier         # logistic | gb_classifier
  device: cpu                 # cpu | cuda
  search: false
  search_scoring: roc_auc

dataset:
  # If empty, use the latest object_detectors/runs/*/fn_results.csv
  csv_path: ""
  results_root: object_detectors/runs

train:
  augmentation: none           # none | smote
  test_size: 0.3
  repeats: 15
  n_jobs: 8
  random_seed: 42
