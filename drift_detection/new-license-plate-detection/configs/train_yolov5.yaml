model:
  type: yolov5
  variant: yolov5x
  weights: yolov5x.pt
  img_size: 640
  confidence_threshold: 0.5
  iou_threshold: 0.45
  device: cuda

dataset:
  name: coco
  root: datasets/DiL datasets/COCO
  train_split: train2017
  val_split: val2017
  test_split: test2017
  image_dir: images
  annotation_dir: annotations
  train_annotation_file: instances_train2017.json
  val_annotation_file: instances_val2017.json
  test_annotation_file: instances_test2017.json
  num_classes: 80
  class_names:
    - person
    - bicycle
    - car
    - motorcycle
    - airplane
    - bus
    - train
    - truck
    - boat
    - traffic light
    - fire hydrant
    - stop sign
    - parking meter
    - bench
    - bird
    - cat
    - dog
    - horse
    - sheep
    - cow
    - elephant
    - bear
    - zebra
    - giraffe
    - backpack
    - umbrella
    - handbag
    - tie
    - suitcase
    - frisbee
    - skis
    - snowboard
    - sports ball
    - kite
    - baseball bat
    - baseball glove
    - skateboard
    - surfboard
    - tennis racket
    - bottle
    - wine glass
    - cup
    - fork
    - knife
    - spoon
    - bowl
    - banana
    - apple
    - sandwich
    - orange
    - broccoli
    - carrot
    - hot dog
    - pizza
    - donut
    - cake
    - chair
    - couch
    - potted plant
    - bed
    - dining table
    - toilet
    - tv
    - laptop
    - mouse
    - remote
    - keyboard
    - cell phone
    - microwave
    - oven
    - toaster
    - sink
    - refrigerator
    - book
    - clock
    - vase
    - scissors
    - teddy bear
    - hair drier
    - toothbrush

dataloader:
  batch_size: 8
  num_workers: 4
  pin_memory: true
  shuffle_train: true
  shuffle_eval: false

loss:
  type: yolov5
  box: 0.05
  cls: 0.5
  obj: 1.0
