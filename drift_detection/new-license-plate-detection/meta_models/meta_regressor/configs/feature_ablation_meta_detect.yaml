mode: feature_ablation

model:
  type: gb_regressor          # ridge | rf_regressor | gb_regressor | xgb_regressor
  device: cpu                 # cpu | cuda
  random_seed: 42

dataset:
  input_root:
    - object_detectors/runs/00-00-0000_00;00_meta_detect
  gt_root: object_detectors/runs/00-00-0000_00;00_gt

experiment:
  process: repeat             # repeat | kfold
  n_jobs: 8

  kfold:
    num_fold: 5

  repeat:
    split: 0.3
    repeats: 5
