mode: train

model:
  type: gb_classifier         # logistic | gb_classifier
  device: cpu                 # cpu | cuda
  random_seed: 42
  search: false
  search_scoring: roc_auc

dataset:
  input_root:
    - object_detectors/runs/00-00-0000_00;00_meta_detect
  gt_root: object_detectors/runs/00-00-0000_00;00_gt
  feature_include:
    - class_probability_vector
    - size_circum
    - score_max
    - iou_pb_mean

experiment:
  process: repeat              # kfold | repeat
  augmentation: none           # none | smote
  n_jobs: 8

  kfold:
    num_fold: 10

  repeat:
    split: 0.3
    repeats: 15
